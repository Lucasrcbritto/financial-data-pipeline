ingestion:
  tickers:
    - AAPL
    - MSFT
    - GOOGL
    - JPM
    - GS
  start_date: "2019-01-01"
  end_date: "2024-12-31"
  fred_series:
    - FEDFUNDS
    - UNRATE
    - CPIAUCSL
    - T10Y2Y

processing:
  null_threshold: 0.95
  required_stock_columns:
    - date
    - ticker
    - open
    - high
    - low
    - close
    - volume

feature_engineering:
  rolling_windows:
    - 7
    - 21
    - 63
  annualization_factor: 252

bigquery:
  project_id: "${GCP_PROJECT_ID}"
  dataset: "financial_data"
  tables:
    fact_prices: "fact_prices"
    dim_ticker: "dim_ticker"
    dim_date: "dim_date"
    dim_macro: "dim_macro"